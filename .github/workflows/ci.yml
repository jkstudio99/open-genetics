name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} — Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, mbstring, json
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --testdox

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, mbstring, json

      - name: PHP Syntax Check
        run: find src/ api/ public/ -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Validate composer.json
        run: composer validate --strict

  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for leaked secrets
        run: |
          echo "Checking for .env.production..."
          if [ -f ".env.production" ]; then
            echo "::error::SECURITY: .env.production found in repo!"
            exit 1
          fi
          echo "No .env.production found. Security check passed."

      - name: Check for sensitive files
        run: |
          FOUND=0
          for pattern in "*.zip" "*.tar.gz" "*.rar" "*.log"; do
            if compgen -G "$pattern" > /dev/null 2>&1; then
              echo "::warning::Found $pattern files in repo root"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "No sensitive files found. Clean repo."
          fi
